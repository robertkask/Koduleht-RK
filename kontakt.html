<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kontakt — Robert Kask</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Archivo+Black&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #ffffff;
      --gray: #888;
      --light: #f0eeeb;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Archivo', sans-serif;
      background: var(--white);
      color: var(--black);
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 400;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      background: var(--white);
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }

    .logo {
      font-family: 'Archivo Black', sans-serif;
      font-size: 24px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--black);
      z-index: 410;
      position: relative;
    }

    .desktop-nav { display: flex; gap: 32px; align-items: center; }

    .desktop-nav a {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--black);
      transition: opacity 0.2s;
    }

    .desktop-nav a:hover { opacity: 0.45; }
    .desktop-nav a.active { border-bottom: 2px solid var(--black); padding-bottom: 2px; }

    /* ── HAMBURGER ── */
    .burger-btn {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 7px;
      width: 44px; height: 44px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
      z-index: 410;
      position: relative;
      flex-shrink: 0;
    }

    .burger-btn span {
      display: block;
      width: 100%;
      height: 3px;
      background: #000;
      border-radius: 0;
      transition: transform 0.3s, opacity 0.3s;
    }

    .burger-btn.open span:nth-child(1) { transform: translateY(10px) rotate(45deg); }
    .burger-btn.open span:nth-child(2) { opacity: 0; }
    .burger-btn.open span:nth-child(3) { transform: translateY(-10px) rotate(-45deg); }

    .mobile-menu {
      display: flex;
      position: fixed;
      inset: 0;
      background: var(--white);
      z-index: 350;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 36px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .mobile-menu.open { opacity: 1; pointer-events: all; }

    .mobile-menu a {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(32px, 8vw, 56px);
      letter-spacing: -0.01em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--black);
      transition: opacity 0.2s;
    }

    .mobile-menu a:hover { opacity: 0.4; }

    /* ── SHARED ── */
    .btn {
      display: inline-block;
      padding: 13px 30px;
      border: 1.5px solid var(--black);
      font-family: 'Archivo', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--black);
      background: transparent;
      cursor: pointer;
      transition: background 0.25s, color 0.25s;
    }
    .btn:hover { background: var(--black); color: var(--white); }

    .section-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 20px;
    }

    /* ── CONTACT MAIN ── */
    .contact-main {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 40px 100px;
      background: var(--white);
    }

    .contact-block {
      text-align: center;
      max-width: 560px;
      width: 100%;
    }

    .contact-block h1 {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(36px, 6vw, 72px);
      line-height: 1.0;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }

    .contact-subtext {
      font-size: 17px;
      color: var(--gray);
      margin-bottom: 48px;
    }

    .contact-divider {
      width: 40px;
      height: 1px;
      background: rgba(0,0,0,0.15);
      margin: 48px auto 40px;
    }

    .contact-company {
      margin-bottom: 0;
    }

    .contact-company p {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gray);
      line-height: 2;
    }

    .contact-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--white);
      border-top: 1px solid rgba(0,0,0,0.1);
      padding: 80px 40px 48px;
    }

    .footer-social {
      margin-bottom: 40px;
    }

    .footer-social p {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 16px;
    }

    .social-links { display: flex; gap: 12px; }

    .social-links a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px; height: 44px;
      border: 1.5px solid var(--black);
      border-radius: 50%;
      font-size: 11px;
      font-weight: 700;
      text-decoration: none;
      color: var(--black);
      text-transform: uppercase;
      transition: background 0.2s, color 0.2s;
    }

    .social-links a:hover { background: var(--black); color: var(--white); }

    .footer-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 32px;
      border-top: 1px solid rgba(0,0,0,0.1);
    }

    .footer-logo {
      font-family: 'Archivo Black', sans-serif;
      font-size: 20px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--black);
    }

    .footer-bottom nav { display: flex; gap: 24px; }
    .footer-bottom nav a {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--gray);
      transition: color 0.2s;
    }
    .footer-bottom nav a:hover { color: var(--black); }
    .footer-copy { font-size: 12px; color: var(--gray); }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .desktop-nav { display: none; }
      .burger-btn { display: flex; }
      header { padding: 16px 24px; }

      .contact-main { padding: 100px 24px 80px; }

      footer { padding: 64px 24px 40px; }
      .footer-bottom { flex-direction: column; gap: 20px; text-align: center; }
      .footer-bottom nav { flex-wrap: wrap; justify-content: center; }
    }

    @media (max-width: 480px) {
      .contact-main { padding: 90px 20px 72px; }
      .contact-buttons { flex-direction: column; align-items: center; }
      footer { padding: 48px 20px 32px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <a class="logo" href="index.html">Robert Kask</a>
    <nav class="desktop-nav">
      <a href="selgus.html">Selgus</a>
      <a href="teraapia.html">Teraapia</a>
      <a href="fotograafia.html">Fotograafia</a>
      <a href="minust.html">Minust</a>
      <a href="kontakt.html" class="active">Kontakt</a>
    </nav>
    <button class="burger-btn" id="burgerBtn" aria-label="Menüü">
      <span></span><span></span><span></span>
    </button>
  </header>

  <div class="mobile-menu" id="mobileMenu">
    <a href="selgus.html"      onclick="closeMenu()">Selgus</a>
    <a href="teraapia.html"    onclick="closeMenu()">Teraapia</a>
    <a href="fotograafia.html" onclick="closeMenu()">Fotograafia</a>
    <a href="minust.html"      onclick="closeMenu()">Minust</a>
    <a href="kontakt.html"     onclick="closeMenu()">Kontakt</a>
  </div>

  <!-- CONTACT -->
  <main class="contact-main">
    <div class="contact-block">
      <h1>Võta minuga ühendust</h1>
      <p class="contact-subtext">Päringud ja broneerimine</p>
      <div class="contact-buttons">
        <a class="btn" href="mailto:robert.kask@gmail.com">E-post</a>
        <a class="btn" href="tel:+37256156109">Telefon</a>
      </div>
      <div class="contact-divider"></div>
      <div class="contact-company">
        <p>Robert Kask OÜ</p>
        <p>Registrikood: 16933082</p>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <div class="footer-social">
      <p>Jälgi</p>
      <div class="social-links">
        <a href="#" title="Instagram">In</a>
        <a href="#" title="LinkedIn">Li</a>
        <a href="#" title="Facebook">Fb</a>
      </div>
    </div>
    <div class="footer-bottom">
      <a class="footer-logo" href="index.html">Robert Kask</a>
      <nav>
        <a href="selgus.html">Selgus</a>
        <a href="teraapia.html">Teraapia</a>
        <a href="fotograafia.html">Fotograafia</a>
        <a href="minust.html">Minust</a>
        <a href="kontakt.html">Kontakt</a>
      </nav>
      <div class="footer-copy">&copy; 2026 Robert Kask OÜ</div>
    </div>
  </footer>

  <script>
    const burgerBtn  = document.getElementById('burgerBtn');
    const mobileMenu = document.getElementById('mobileMenu');

    burgerBtn.addEventListener('click', () => {
      const isOpen = burgerBtn.classList.toggle('open');
      mobileMenu.classList.toggle('open', isOpen);
      document.body.style.overflow = isOpen ? 'hidden' : '';
    });

    function closeMenu() {
      burgerBtn.classList.remove('open');
      mobileMenu.classList.remove('open');
      document.body.style.overflow = '';
    }
  </script>

</body>
</html>
