<html lang="et">
<head>

  <meta property="og:description" content="Võta minuga ühendust. Päringud, broneerimine ja koostööpakkumised." />
  <meta property="og:image" content="https://robertkask.github.io/Koduleht-RK/P8192470.jpg" />

  <link rel="apple-touch-icon" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #ffffff;
      --gray: #888;
      --light: #f0eeeb;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Archivo', sans-serif;
      background: var(--white);
      color: var(--black);
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 400;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      background: var(--white);
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }

    .logo {
      font-family: 'Archivo Black', sans-serif;
      font-size: 24px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--black);
      z-index: 410;
      position: relative;
    }

    .desktop-nav { display: flex; gap: 32px; align-items: center; }

    .desktop-nav a {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--black);
      transition: opacity 0.2s;
    }

    .desktop-nav a:hover { opacity: 0.45; }
    .desktop-nav a.active { border-bottom: 2px solid var(--black); padding-bottom: 2px; }

    /* ── HAMBURGER ── */
    .burger-btn {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 7px;
      width: 44px; height: 44px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
      z-index: 410;
      position: relative;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      -webkit-appearance: none;
      outline: none;
      overflow: hidden;
    }

    .burger-btn:focus { outline: none; }

    .burger-btn span {
      display: block;
      width: 100%;
      height: 3px;
      background: #000;
      border-radius: 0;
      transition: transform 0.3s, opacity 0.3s;
    }

    .burger-btn.open span:nth-child(1) { transform: translateY(10px) rotate(45deg); }
    .burger-btn.open span:nth-child(2) { opacity: 0; }
    .burger-btn.open span:nth-child(3) { transform: translateY(-10px) rotate(-45deg); }

    .mobile-menu {
      display: flex;
      position: fixed;
      inset: 0;
      background: var(--white);
      z-index: 350;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 36px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .mobile-menu.open { opacity: 1; pointer-events: all; }

    .mobile-menu a {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(32px, 8vw, 56px);
      letter-spacing: -0.01em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--black);
      transition: opacity 0.2s;
    }

    .mobile-menu a:hover { opacity: 0.4; }

    /* ── SHARED ── */
    .btn {
      display: inline-block;
      padding: 13px 30px;
      border: 1.5px solid var(--black);
      font-family: 'Archivo', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--black);
      background: transparent;
      cursor: pointer;
      transition: background 0.25s, color 0.25s;
    }
    .btn:hover { background: var(--black); color: var(--white); }

    .section-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 20px;
    }

    /* ── CONTACT MAIN ── */
    .contact-main {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 40px 100px;
      background: var(--white);
    }

    .contact-block {
      text-align: center;
      max-width: 560px;
      width: 100%;
    }

    .contact-block h1 {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(36px, 6vw, 72px);
      line-height: 1.0;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }

    .contact-subtext {
      font-size: 17px;
      color: var(--gray);
      margin-bottom: 48px;
    }

    .contact-divider {
      width: 40px;
      height: 1px;
      background: rgba(0,0,0,0.15);
      margin: 48px auto 40px;
    }

    .contact-company {
      margin-bottom: 0;
    }

    .contact-company p {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gray);
      line-height: 2;
    }

    .contact-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .contact-buttons .btn {
      width: 160px;
      text-align: center;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--white);
      border-top: 1px solid rgba(0,0,0,0.1);
      padding: 0 40px 48px;
    }

    .footer-social-icons { display: flex; gap: 10px; align-items: center; }

    .footer-social-icons a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px; height: 34px;
      border: 1.5px solid var(--black);
      border-radius: 50%;
      text-decoration: none;
      color: var(--black);
      transition: background 0.2s, color 0.2s;
    }

    .footer-social-icons a:hover { background: var(--black); color: var(--white); }

    .footer-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 32px;
      border-top: 1px solid rgba(0,0,0,0.1);
    }

    .footer-logo {
      font-family: 'Archivo Black', sans-serif;
      font-size: 20px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--black);
    }

    .footer-bottom nav { display: flex; gap: 24px; }
    .footer-bottom nav a {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--gray);
      transition: color 0.2s;
    }
    .footer-bottom nav a:hover { color: var(--black); }
    .footer-copy { font-size: 12px; color: var(--gray); }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .desktop-nav { display: none; }
      .burger-btn { display: flex; }
      header { padding: 16px 24px; }

      .contact-main { padding: 100px 24px 80px; }

      footer { padding: 0 24px 40px; }
      .footer-bottom { flex-direction: column; gap: 20px; text-align: center; }
      .footer-bottom nav { flex-wrap: wrap; justify-content: center; }
    }

    @media (max-width: 480px) {
      .contact-main { padding: 90px 20px 72px; }
      .contact-buttons { justify-content: center; }
      footer { padding: 0 20px 32px; }
    }
  </style>
</head>

  <script>
    const burgerBtn  = document.getElementById('burgerBtn');
    const mobileMenu = document.getElementById('mobileMenu');

    burgerBtn.addEventListener('click', () => {
      const isOpen = burgerBtn.classList.toggle('open');
      mobileMenu.classList.toggle('open', isOpen);
      document.body.style.overflow = isOpen ? 'hidden' : '';
    });

    function closeMenu() {
      burgerBtn.classList.remove('open');
      mobileMenu.classList.remove('open');
      document.body.style.overflow = '';
    }
  </script>
